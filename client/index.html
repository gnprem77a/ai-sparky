<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5, viewport-fit=cover" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#07070f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AI Sparky</title>
    <meta name="description" content="AI Sparky — your personal AI chat assistant, powered by Claude" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"></noscript>
    <script>
      (function() {
        var stored = localStorage.getItem('theme');
        if (stored === 'light') {
          document.documentElement.classList.remove('dark');
        } else {
          document.documentElement.classList.add('dark');
        }
        var colorTheme = localStorage.getItem('color-theme');
        var colorMap = { ocean: 'theme-ocean', sunset: 'theme-sunset', forest: 'theme-forest', midnight: 'theme-midnight', rose: 'theme-rose', hacker: 'theme-hacker' };
        if (colorTheme && colorMap[colorTheme]) {
          document.documentElement.classList.add(colorMap[colorTheme]);
        }
      })();
    </script>
    <style>
      /* Inline boot screen — shows instantly before any JS loads */
      #boot-screen {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; align-items: center; justify-content: center;
        background: #f9f9fb;
        transition: opacity 0.2s ease;
      }
      html.dark #boot-screen { background: #07070f; }
      #boot-screen.hidden { opacity: 0; pointer-events: none; }
      .boot-dots { display: flex; gap: 6px; }
      .boot-dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: #a0a0b0;
        animation: boot-pulse 1.2s ease-in-out infinite;
      }
      .boot-dot:nth-child(2) { animation-delay: 0.2s; }
      .boot-dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes boot-pulse {
        0%, 80%, 100% { opacity: 0.3; transform: scale(0.85); }
        40% { opacity: 1; transform: scale(1); }
      }
    </style>
  </head>
  <body>
    <div id="boot-screen">
      <div class="boot-dots">
        <div class="boot-dot"></div>
        <div class="boot-dot"></div>
        <div class="boot-dot"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Expose global helper so React can dismiss the boot screen on first render
      window.__hideBootScreen = function() {
        var el = document.getElementById('boot-screen');
        if (!el) return;
        el.classList.add('hidden');
        setTimeout(function(){ if (el.parentNode) el.parentNode.removeChild(el); }, 300);
      };
    </script>
  </body>
</html>
