version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: aisparky-db
    restart: always
    environment:
      POSTGRES_USER: sparky
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: aisparky
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sparky -d aisparky"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: aisparky-app
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://sparky:${DB_PASSWORD}@db:5432/aisparky
      DB_PASSWORD: ${DB_PASSWORD}
      SESSION_SECRET: ${SESSION_SECRET}
      NODE_ENV: production
      PORT: 5000
      APP_URL: ${APP_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}

volumes:
  pgdata:
